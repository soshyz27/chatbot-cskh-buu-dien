<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chatbot CSKH Bưu điện</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f0f2f5;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  .chat-container {
    width: 420px;
    height: 640px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .chat-header {
    background: #c8102e;
    color: white;
    padding: 16px;
    font-weight: 600;
    font-size: 16px;
  }
  .chat-header span {
    display: block;
    font-weight: 400;
    font-size: 12px;
    opacity: 0.85;
    margin-top: 2px;
  }
  .chat-messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.4;
    white-space: pre-wrap;
  }
  .msg.user {
    align-self: flex-end;
    background: #c8102e;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: #eef0f3;
    color: #222;
    border-bottom-left-radius: 4px;
  }
  .msg.bot .intent-tag {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    color: #888;
    background: #dfe3e8;
    padding: 2px 6px;
    border-radius: 8px;
  }
  .msg.loading {
    align-self: flex-start;
    color: #888;
    font-style: italic;
    font-size: 13px;
  }
  .chat-input {
    display: flex;
    padding: 12px;
    border-top: 1px solid #eee;
    gap: 8px;
  }
  .chat-input input {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 20px;
    outline: none;
    font-size: 14px;
  }
  .chat-input input:focus {
    border-color: #c8102e;
  }
  .chat-input button {
    background: #c8102e;
    color: white;
    border: none;
    border-radius: 20px;
    padding: 10px 18px;
    cursor: pointer;
    font-size: 14px;
  }
  .chat-input button:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    Chatbot CSKH Bưu điện
    <span>Tra cứu đơn hàng · Hỏi đáp · Khiếu nại</span>
  </div>
  <div class="chat-messages" id="messages">
    <div class="msg bot">Xin chào! Chúng tôi có thể giúp gì cho bạn? Bạn có thể hỏi về tình trạng đơn hàng, các câu hỏi thường gặp, hoặc gửi khiếu nại.</div>
  </div>
  <div class="chat-input">
    <input type="text" id="userInput" placeholder="Nhập tin nhắn..." autocomplete="off">
    <button id="sendBtn">Gửi</button>
  </div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
let sessionId = null; // sẽ được gán sau lần gọi /chat đầu tiên

function appendMessage(text, sender, intent) {
  const div = document.createElement('div');
  div.className = 'msg ' + sender;
  div.textContent = text;
  if (intent) {
    const tag = document.createElement('span');
    tag.className = 'intent-tag';
    tag.textContent = 'intent: ' + intent;
    div.appendChild(document.createElement('br'));
    div.appendChild(tag);
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  appendMessage(text, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;

  const loadingEl = appendMessage('Đang xử lý...', 'loading');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, session_id: sessionId })
    });

    if (!res.ok) {
      throw new Error('Server trả về lỗi ' + res.status);
    }

    const data = await res.json();
    sessionId = data.session_id;
    loadingEl.remove();
    appendMessage(data.reply, 'bot', data.intent);
  } catch (err) {
    loadingEl.remove();
    appendMessage('Xin lỗi, có lỗi xảy ra: ' + err.message, 'bot');
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') sendMessage();
});
</script>

</body>
</html>
